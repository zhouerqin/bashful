name: CI
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y bats shellcheck
      - name: Shell syntax check
        run: bash -n logger.sh interactive.sh _colors.sh examples.sh
      - name: Shellcheck
        run: shellcheck -s bash logger.sh interactive.sh _colors.sh
      - name: Bats tests
        run: bats tests/
